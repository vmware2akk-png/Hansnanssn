name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt update
          # Добавляем расширенный набор для сборки нативных библиотек
          sudo apt install -y build-essential git python3 python3-pip python3-dev zip unzip zlib1g-dev libffi-dev libssl-dev cmake libtool autoconf automake pkg-config libltdl-dev m4
          pip3 install --user --upgrade buildozer cython virtualenv

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Принимаем лицензии
          yes | buildozer android p4a -- sdkmanager --licenses || true
          # Принудительная очистка и сборка
          buildozer -v android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpaceEngine-APK
          path: bin/*.apk
